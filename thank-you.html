<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Thank You | The Upstate Parties</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
:root {
      --er-navy: #0f172a;
      --er-navy-soft: #111827;
      --er-orange: #f97316;
      --er-orange-dark: #ea580c;
      --er-sky: #0ea5e9;
      --er-bg: #f9fafb;
      --er-muted: #6b7280;
      --er-border: #e5e7eb;
      --er-radius-lg: 1.25rem;
    }

    /* BASIC RESET */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--er-navy);
      background: #ffffff;
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .er-container {
      width: 92%;
      max-width: 1150px;
      margin: 0 auto;
    }

    /* TOP BAR */
    .er-topbar {
      background: var(--er-navy);
      color: #f9fafb;
      font-size: 0.85rem;
    }

    .er-topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .er-topbar-left span {
      opacity: 0.85;
    }

    .er-topbar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .er-topbar-phone {
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .er-topbar-cta {
      background: var(--er-orange);
      border-radius: 999px;
      padding: 0.35rem 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.8rem;
    }

    .er-topbar-cta:hover {
      background: var(--er-orange-dark);
    }

    /* HEADER / NAV */
    .er-header {
      border-bottom: 1px solid var(--er-border);
      background: #ffffff;
    }

    .er-header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 0;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .er-logo-block {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .er-logo-mark {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, var(--er-orange), var(--er-navy-soft));
    }

    .er-logo-img {
      max-height: 55px;
      width: auto;
      display: block;
    }

    .er-logo-text {
      font-weight: 800;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .er-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      align-items: center;
    }

    .er-nav a,
    .er-nav-parent {
      position: relative;
      color: inherit;
      text-decoration: none;
      white-space: nowrap;
    }

    .er-nav a::after,
    .er-nav-parent::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -0.25rem;
      width: 0;
      height: 2px;
      background: var(--er-orange);
      transition: width 0.15s ease;
    }

    .er-nav a:hover::after,
    .er-nav-parent:hover::after,
    .er-nav-dropdown:hover .er-nav-parent::after,
    .er-nav-dropdown:focus-within .er-nav-parent::after {
      width: 100%;
    }

    .er-nav-dropdown {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .er-nav-parent {
      cursor: default;
    }

    .er-nav-dropdown::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
      height: 14px;
    }

    .er-nav-dropdown-menu {
      position: absolute;
      top: 100%;
      left: 0;
      min-width: 270px;
      background: #ffffff;
      border: 1px solid var(--er-border);
      border-radius: 0.9rem;
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.14);
      padding: 0.85rem 0.5rem 0.5rem;
      display: none;
      z-index: 25;
    }

    .er-nav-dropdown-menu a {
      display: block;
      padding: 0.55rem 0.7rem;
      border-radius: 0.65rem;
    }

    .er-nav-dropdown-menu a::after {
      display: none;
    }

    .er-nav-dropdown-menu a:hover {
      background: #f9fafb;
      color: var(--er-orange-dark);
    }

    .er-nav-dropdown:hover .er-nav-dropdown-menu,
    .er-nav-dropdown:focus-within .er-nav-dropdown-menu {
      display: block;
    }

    /* HERO AREA */
    .er-hero {
      background: radial-gradient(circle at top left, #dbeafe, #ffffff 45%, #f9fafb);
      padding: 2.5rem 0 3rem;
    }

    .er-hero-inner {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 2rem;
      align-items: stretch;
    }

    .er-location-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 0.7rem;
    }

    .er-location-pill span {
      font-size: 1rem;
    }

    .er-hero h1 {
      font-size: clamp(2.1rem, 3vw, 2.8rem);
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }

    .er-hero h2 {
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--er-sky);
      margin-bottom: 0.6rem;
    }

    .er-hero-sub {
      font-size: 0.98rem;
      color: var(--er-muted);
      max-width: 32rem;
      margin-bottom: 1.2rem;
    }

    .er-hero-bullets {
      font-size: 0.9rem;
      color: var(--er-muted);
      list-style: none;
      margin-bottom: 1.2rem;
    }

    .er-hero-bullets li {
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .er-hero-bullets li::before {
      content: "✓";
      color: var(--er-orange);
      font-weight: 700;
      font-size: 0.9rem;
    }

    .er-hero-cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }

    .er-btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.65rem 1.4rem;
      border-radius: 999px;
      background: var(--er-orange);
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      transition: background 0.12s ease, transform 0.12s ease, box-shadow 0.12s ease;
    }

    .er-btn-primary:hover {
      background: var(--er-orange-dark);
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.22);
    }

    .er-btn-ghost {
      padding: 0.6rem 1.2rem;
      border-radius: 999px;
      border: 1px solid var(--er-border);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--er-navy-soft);
      background: #ffffff;
      cursor: pointer;
    }

    .er-btn-ghost:hover {
      border-color: var(--er-orange);
      color: var(--er-orange-dark);
    }

    .er-hero-phone-note {
      font-size: 0.85rem;
      color: var(--er-muted);
      margin-top: 0.5rem;
    }

    .er-hero-card {
      background: #ffffff;
      border-radius: var(--er-radius-lg);
      border: 1px solid var(--er-border);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      padding: 1.5rem 1.4rem 1.4rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .er-hero-card-header {
      margin-bottom: 1rem;
    }

    .er-hero-card-eyebrow {
      font-size: 0.78rem;
      color: var(--er-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 0.35rem;
    }

    .er-hero-card-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 0.2rem;
    }

    .er-hero-card-sub {
      font-size: 0.9rem;
      color: var(--er-muted);
    }

    .er-hero-card-call-block {
      margin-top: 0.8rem;
      padding: 0.7rem 0.9rem;
      border-radius: 0.9rem;
      background: #f9fafb;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .er-hero-card-call-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--er-muted);
    }

    .er-hero-card-phone {
      font-size: 1.1rem;
      font-weight: 800;
    }

    .er-hero-card-small {
      font-size: 0.8rem;
      color: var(--er-muted);
    }

    .er-hero-simple-form {
      margin-top: 1rem;
      display: grid;
      gap: 0.7rem;
    }

    .er-field-label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--er-muted);
      margin-bottom: 0.15rem;
    }

    .er-input,
    .er-select,
    .er-textarea {
      width: 100%;
      padding: 0.55rem 0.7rem;
      border-radius: 0.6rem;
      border: 1px solid var(--er-border);
      font-size: 0.9rem;
    }

    .er-textarea {
      resize: vertical;
      min-height: 70px;
    }

    .er-hero-card-disclaimer {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--er-muted);
    }

    /* GLOBAL SECTIONS */
    section {
      padding: 3rem 0;
    }

    section:nth-of-type(even) {
      background: var(--er-bg);
    }

    .er-section-title {
      text-align: center;
      margin-bottom: 2.2rem;
    }

    .er-section-title h2 {
      font-size: 1.7rem;
      margin-bottom: 0.5rem;
    }

    .er-section-title p {
      font-size: 0.95rem;
      color: var(--er-muted);
      max-width: 34rem;
      margin: 0.2rem auto 0;
    }

    /* PROCESS SECTION */
    .er-process-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1.4rem;
    }

    .er-process-card {
      background: #ffffff;
      border-radius: var(--er-radius-lg);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      padding: 1.4rem 1.3rem;
      border-top: 3px solid var(--er-orange);
    }

    .er-process-step {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--er-muted);
      margin-bottom: 0.35rem;
    }

    .er-process-card h3 {
      font-size: 1.05rem;
      margin-bottom: 0.35rem;
    }

    .er-process-card p {
      font-size: 0.9rem;
      color: var(--er-muted);
    }

    /* PACKAGES */
    .er-packages-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1.6rem;
    }

    .er-card {
      background: #ffffff;
      border-radius: var(--er-radius-lg);
      padding: 1.4rem 1.3rem;
      border: 1px solid var(--er-border);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
    }

    .er-card.featured {
      border-width: 2px;
      border-color: var(--er-orange);
      box-shadow: 0 15px 35px rgba(15, 23, 42, 0.14);
    }

    .er-card h3 {
      font-size: 1.08rem;
      margin-bottom: 0.35rem;
    }

    .er-card-sub {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--er-muted);
      margin-bottom: 0.3rem;
    }

    .er-card-text {
      font-size: 0.9rem;
      color: var(--er-muted);
      margin-bottom: 0.7rem;
    }

    .er-price-tag {
      font-size: 1.2rem;
      font-weight: 800;
      margin-bottom: 0.25rem;
    }

    .er-price-note {
      font-size: 0.8rem;
      color: var(--er-muted);
      margin-bottom: 0.8rem;
    }

    .er-bullet-list {
      list-style: none;
      font-size: 0.9rem;
      color: var(--er-muted);
      margin-bottom: 0.9rem;
    }

    .er-bullet-list li {
      margin-bottom: 0.3rem;
      padding-left: 1.1rem;
      position: relative;
    }

    .er-bullet-list li::before {
      content: "•";
      position: absolute;
      left: 0.1rem;
      color: var(--er-sky);
    }

    /* SERVICE AREA */
    .er-service-area {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 1.8rem;
      align-items: center;
    }

    .er-service-area-text p {
      font-size: 0.96rem;
      color: var(--er-muted);
      margin-bottom: 0.8rem;
    }

    .er-service-area-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }

    .er-chip {
      font-size: 0.8rem;
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      background: #ffffff;
      border: 1px dashed var(--er-border);
    }

    .er-service-area-box {
      border-radius: var(--er-radius-lg);
      background: #0b1120;
      color: #e5e7eb;
      padding: 1.4rem 1.3rem;
    }

    .er-service-area-box h3 {
      font-size: 1.05rem;
      margin-bottom: 0.4rem;
    }

    .er-service-area-box p {
      font-size: 0.9rem;
      color: #d1d5db;
    }

    /* TESTIMONIALS */
    .er-testimonials-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1.6rem;
    }

    .er-testimonial-card {
      background: #ffffff;
      border-radius: var(--er-radius-lg);
      border: 1px solid var(--er-border);
      padding: 1.3rem 1.2rem;
    }

    .er-stars {
      color: #fbbf24;
      font-size: 0.9rem;
      margin-bottom: 0.3rem;
    }

    .er-testimonial-body {
      font-size: 0.9rem;
      color: var(--er-muted);
      margin-bottom: 0.6rem;
    }

    .er-testimonial-name {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .er-testimonial-meta {
      font-size: 0.78rem;
      color: var(--er-muted);
    }

    /* CONTACT / QUOTE FORM */
    .er-contact-section {
      padding-bottom: 3.5rem;
    }

    .er-contact-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(0, 1.1fr);
      gap: 2rem;
      align-items: flex-start;
    }

    .er-contact-info p {
      font-size: 0.95rem;
      color: var(--er-muted);
      margin-bottom: 0.8rem;
    }

    .er-contact-list {
      list-style: none;
      font-size: 0.9rem;
      color: var(--er-muted);
      margin-bottom: 1.1rem;
    }

    .er-contact-list li {
      margin-bottom: 0.25rem;
    }

    .er-contact-list span {
      font-weight: 600;
    }

    .er-contact-note {
      font-size: 0.8rem;
      color: var(--er-muted);
    }

    .er-contact-card {
      background: #ffffff;
      border-radius: var(--er-radius-lg);
      border: 1px solid var(--er-border);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      padding: 1.5rem 1.4rem;
    }

    .er-contact-card h3 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    .er-contact-card p {
      font-size: 0.86rem;
      color: var(--er-muted);
      margin-bottom: 0.9rem;
    }

    .er-contact-grid form {
      display: grid;
      gap: 0.86rem;
    }

    .er-disclaimer-small {
      font-size: 0.75rem;
      color: var(--er-muted);
      margin-top: 0.4rem;
    }

    /* FOOTER STRIP */
    .er-footer-strip {
      border-top: 1px solid var(--er-border);
      padding: 1.2rem 0 1.6rem;
      font-size: 0.8rem;
      color: var(--er-muted);
      text-align: center;
    }

    .er-footer-strip strong {
      font-weight: 700;
    }

    @media (max-width: 980px) {
      .er-hero-inner,
      .er-service-area,
      .er-contact-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      .er-header-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .er-nav {
        justify-content: flex-start;
      }

      .er-process-grid,
      .er-packages-grid,
      .er-testimonials-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .er-process-grid,
      .er-packages-grid,
      .er-testimonials-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      .er-topbar-inner {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  
    .er-hero-image {
      margin: 1.5rem 0;
    }

    .er-hero-image img {
      width: 100%;
      max-width: 520px;
      border-radius: 1rem;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.15);
    }

  
    /* FAQ SECTION */
    .er-faq-section {
      padding: 3rem 0;
      background: #ffffff;
    }

    .er-faq-title {
      text-align: center;
      font-size: 1.7rem;
      margin-bottom: 1.8rem;
    }

    .er-faq-item {
      background: #f9fafb;
      border: 1px solid var(--er-border);
      border-radius: 0.9rem;
      padding: 1rem 1.2rem;
      margin-bottom: 0.9rem;
    }

    .er-faq-item summary {
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      list-style: none;
    }

    .er-faq-item summary::-webkit-details-marker {
      display: none;
    }

    .er-faq-item summary::after {
      content: "+";
      float: right;
      font-size: 1.2rem;
      color: var(--er-orange);
    }

    .er-faq-item[open] summary::after {
      content: "–";
    }

    .er-faq-item p {
      margin-top: 0.7rem;
      font-size: 0.9rem;
      color: var(--er-muted);
      line-height: 1.55;
    }

    /* FAQ CTA */
    .er-faq-cta {
      margin-top: 2rem;
      padding: 1.6rem;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 1rem;
      text-align: center;
    }

    .er-faq-cta h3 {
      font-size: 1.2rem;
      margin-bottom: 0.4rem;
    }

    .er-faq-cta p {
      font-size: 0.95rem;
      color: var(--er-muted);
      margin-bottom: 0.9rem;
    }

/* Blog layout styles */
.er-blog-hero {
      background: radial-gradient(circle at top left, #dbeafe, #ffffff 45%, #f9fafb);
      padding: 2.5rem 0 2.5rem;}

.er-breadcrumb {
      font-size: 0.8rem;
      color: var(--er-muted);
      margin-bottom: 0.8rem;}

.er-breadcrumb a { color: var(--er-muted);}

.er-breadcrumb span { opacity: 0.7;}

.er-blog-hero h1 {
      font-size: clamp(2rem, 3vw, 2.6rem);
      line-height: 1.15;
      margin-bottom: 0.7rem;}

.er-blog-hero p {
      font-size: 0.98rem;
      color: var(--er-muted);
      max-width: 40rem;}

.er-blog-meta {
      margin-top: 0.7rem;
      font-size: 0.8rem;
      color: var(--er-muted);}

.er-blog-main {
      padding: 2.5rem 0 3rem;
      background: #ffffff;}

.er-blog-layout {
      display: grid;
      grid-template-columns: minmax(0, 2.1fr) minmax(0, 1fr);
      gap: 2.5rem;
      align-items: flex-start;}

.er-blog-content h2 {
      font-size: 1.4rem;
      margin: 1.8rem 0 0.6rem;}

.er-blog-content h3 {
      font-size: 1.1rem;
      margin: 1.4rem 0 0.5rem;}

.er-blog-content p {
      font-size: 0.98rem;
      color: var(--er-navy-soft);
      margin-bottom: 0.9rem;}

.er-blog-content ul {
      padding-left: 1.1rem;
      margin-bottom: 1rem;
      font-size: 0.96rem;
      color: var(--er-navy-soft);}

.er-blog-content li {
      margin-bottom: 0.35rem;}

.er-blog-image {
      margin: 1.3rem 0;
      border-radius: var(--er-radius-lg);
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.16);}

.er-blog-image figcaption {
      font-size: 0.8rem;
      color: var(--er-muted);
